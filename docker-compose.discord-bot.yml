services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile.discord-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_ROLE_UNVERIFIED_ID=${DISCORD_ROLE_UNVERIFIED_ID}
      - DISCORD_ROLE_VERIFIED_ID=${DISCORD_ROLE_VERIFIED_ID}
      - DISCORD_ROLE_MEMBER_ID=${DISCORD_ROLE_MEMBER_ID}
      - DISCORD_ROLE_PRO_ID=${DISCORD_ROLE_PRO_ID}
      - DISCORD_ROLE_ADMIN_ID=${DISCORD_ROLE_ADMIN_ID:-1510805262280298576}
      - DISCORD_ROLE_MODERATOR_ID=${DISCORD_ROLE_MODERATOR_ID:-1510805348120793138}
      - DISCORD_CHANNEL_VERIFICATION_ID=${DISCORD_CHANNEL_VERIFICATION_ID}
      - DISCORD_CHANNEL_OFFICIAL_LINKS_ID=${DISCORD_CHANNEL_OFFICIAL_LINKS_ID:-1510828840161771631}
      - DISCORD_CHANNEL_RULES_ID=${DISCORD_CHANNEL_RULES_ID:-1516273847190683820}
      - DISCORD_CHANNEL_FAQS_ID=${DISCORD_CHANNEL_FAQS_ID:-1510807143253803079}
      - DISCORD_CHANNEL_MEMBER_SUPPORT_ID=${DISCORD_CHANNEL_MEMBER_SUPPORT_ID:-1516293166007849200}
      - DISCORD_CHANNEL_OPEN_TICKET_ID=${DISCORD_CHANNEL_OPEN_TICKET_ID:-}
      - DISCORD_CATEGORY_SUPPORT_ID=${DISCORD_CATEGORY_SUPPORT_ID:-}
      - DISCORD_CHANNEL_BILLING_ID=${DISCORD_CHANNEL_BILLING_ID:-1516296694839377930}
      - DISCORD_CHANNEL_CHURN_ID=${DISCORD_CHANNEL_CHURN_ID:-1516296758664232971}
      - DISCORD_CHANNEL_GROWTH_ID=${DISCORD_CHANNEL_GROWTH_ID:-1516296841627570279}
      - DISCORD_CHANNEL_REFERRALS_ID=${DISCORD_CHANNEL_REFERRALS_ID:-1516296894123344004}
      - DISCORD_CHANNEL_BOT_LOG=${DISCORD_CHANNEL_BOT_LOG:-1516298968626364477}
      - DISCORD_CHANNEL_PRO_MEMBER_FORUMS=${DISCORD_CHANNEL_PRO_MEMBER_FORUMS:-1510800077889867787}
      - DISCORD_CHANNEL_CALLS_ID=${DISCORD_CHANNEL_CALLS_ID}
      - DISCORD_CHANNEL_TARGETS_ID=${DISCORD_CHANNEL_TARGETS_ID}
      - DISCORD_CHANNEL_MEMBER_CHAT_ID=${DISCORD_CHANNEL_MEMBER_CHAT_ID}
      - DISCORD_CHANNEL_PRO_MEMBER_CHAT_ID=${DISCORD_CHANNEL_PRO_MEMBER_CHAT_ID}
      - PORTFUEL_APP_URL=${PORTFUEL_APP_URL}
      - BOT_API_KEY=${BOT_API_KEY}
      - DISCORD_BOT_WORKER_ID=${DISCORD_BOT_WORKER_ID}
    restart: unless-stopped

